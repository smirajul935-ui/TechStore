name: Build Tech Store APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    - name: GENERATE FULL APP CODE (ALL PROBLEMS FIXED)
      run: |
        # 1. Folders banana
        mkdir -p app/src/main/java/com/techstore/models
        mkdir -p app/src/main/java/com/techstore/adapters
        mkdir -p app/src/main/java/com/techstore/utils
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/drawable
        mkdir -p app/src/main/res/mipmap-anydpi-v26

        # ==========================================
        # 2. GRADLE & BUILD FILES
        # ==========================================
        cat << 'EOF' > settings.gradle
        pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
        dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS); repositories { google(); mavenCentral(); maven { url 'https://jitpack.io' } } }
        rootProject.name = "TechStore"
        include ':app'
        EOF

        cat << 'EOF' > build.gradle
        buildscript { repositories { google(); mavenCentral() } dependencies { classpath 'com.android.tools.build:gradle:8.1.1' } }
        allprojects { repositories { google(); mavenCentral() } }
        EOF

        cat << 'EOF' > gradle.properties
        android.useAndroidX=true
        android.enableJetifier=true
        org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
        EOF

        cat << 'EOF' > app/build.gradle
        plugins { id 'com.android.application' }
        android {
            namespace 'com.techstore'
            compileSdk 34
            defaultConfig { applicationId "com.techstore"; minSdk 24; targetSdk 34; versionCode 1; versionName "1.0" }
            buildTypes { release { minifyEnabled false } }
            compileOptions { sourceCompatibility JavaVersion.VERSION_1_8; targetCompatibility JavaVersion.VERSION_1_8 }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
            implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
            implementation 'androidx.swiperefreshlayout:swiperefreshlayout:1.1.0'
            implementation 'com.android.volley:volley:1.2.1'
            implementation 'com.github.bumptech.glide:glide:4.16.0'
            annotationProcessor 'com.github.bumptech.glide:compiler:4.16.0'
        }
        EOF

        # ==========================================
        # 3. MANIFEST
        # ==========================================
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
            <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
            <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
            <application android:allowBackup="false" android:icon="@mipmap/ic_launcher" android:label="Tech Store" android:roundIcon="@mipmap/ic_launcher_round" android:supportsRtl="true" android:theme="@style/Theme.TechStore" android:usesCleartextTraffic="true">
                <activity android:name=".SplashActivity" android:exported="true" android:theme="@style/Theme.TechStore.NoActionBar">
                    <intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter>
                </activity>
                <activity android:name=".TermsActivity" android:exported="false" android:theme="@style/Theme.TechStore.NoActionBar" />
                <activity android:name=".MainActivity" android:exported="false" android:theme="@style/Theme.TechStore.NoActionBar" />
                <activity android:name=".DetailsActivity" android:exported="false" android:theme="@style/Theme.TechStore.NoActionBar" />
            </application>
        </manifest>
        EOF

        # ==========================================
        # 4. XML RESOURCES & LOGOS
        # ==========================================
        cat << 'EOF' > app/src/main/res/values/colors.xml
        <resources><color name="bg_dark">#0B0B0B</color><color name="card_dark">#1A1A1A</color><color name="accent_purple">#A855F7</color><color name="accent_cyan">#00FFFF</color><color name="text_white">#FFFFFF</color><color name="text_gray">#AAAAAA</color></resources>
        EOF

        cat << 'EOF' > app/src/main/res/values/themes.xml
        <resources><style name="Theme.TechStore" parent="Theme.MaterialComponents.DayNight.DarkActionBar"><item name="colorPrimary">@color/accent_purple</item><item name="colorPrimaryVariant">@color/accent_cyan</item><item name="colorOnPrimary">@color/text_white</item><item name="android:windowBackground">@color/bg_dark</item><item name="android:textColor">@color/text_white</item></style><style name="Theme.TechStore.NoActionBar"><item name="windowActionBar">false</item><item name="windowNoTitle">true</item><item name="android:statusBarColor">@color/bg_dark</item></style></resources>
        EOF

        cat << 'EOF' > app/src/main/res/drawable/bg_rounded_search.xml
        <shape xmlns:android="http://schemas.android.com/apk/res/android"><solid android:color="#1A1A1A"/><corners android:radius="24dp"/><stroke android:width="1dp" android:color="#33FFFFFF"/></shape>
        EOF

        cat << 'EOF' > app/src/main/res/drawable/bg_button_gradient.xml
        <shape xmlns:android="http://schemas.android.com/apk/res/android"><gradient android:startColor="#A855F7" android:endColor="#00FFFF" android:angle="0"/><corners android:radius="12dp"/></shape>
        EOF

        # Logo Vectors
        cat << 'EOF' > app/src/main/res/drawable/ic_launcher_background.xml
        <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108"><path android:fillColor="#0B0B0B" android:pathData="M0,0h108v108h-108z" /></vector>
        EOF

        cat << 'EOF' > app/src/main/res/drawable/ic_launcher_foreground.xml
        <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108"><path android:fillColor="#A855F7" android:pathData="M77.5,36.5h-9c0,-9.94 -8.06,-18 -18,-18s-18,8.06 -18,18h-9c-4.95,0 -9,4.05 -9,9v54c0,4.95 4.05,9 9,9h54c4.95,0 9,-4.05 9,-9v-54C86.5,40.55 82.45,36.5 77.5,36.5z" /></vector>
        EOF

        cat << 'EOF' > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
        <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android"><background android:drawable="@drawable/ic_launcher_background" /><foreground android:drawable="@drawable/ic_launcher_foreground" /></adaptive-icon>
        EOF
        cp app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml

        # ==========================================
        # 5. XML LAYOUTS
        # ==========================================
        cat << 'EOF' > app/src/main/res/layout/activity_splash.xml
        <?xml version="1.0" encoding="utf-8"?><RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#0B0B0B"><TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:layout_centerInParent="true" android:text="TECH STORE" android:textColor="#A855F7" android:textSize="36sp" android:textStyle="bold" /><ProgressBar android:layout_width="wrap_content" android:layout_height="wrap_content" android:layout_alignParentBottom="true" android:layout_centerHorizontal="true" android:layout_marginBottom="50dp" android:indeterminateTint="#00FFFF" /></RelativeLayout>
        EOF

        cat << 'EOF' > app/src/main/res/layout/activity_terms.xml
        <?xml version="1.0" encoding="utf-8"?><LinearLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:orientation="vertical" android:background="#0B0B0B" android:padding="16dp"><TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="TERMS &amp; CONDITIONS" android:textColor="#00FFFF" android:textSize="22sp" android:textStyle="bold" android:layout_gravity="center" android:layout_marginBottom="16dp"/><ScrollView android:layout_width="match_parent" android:layout_height="0dp" android:layout_weight="1" android:background="#1A1A1A" android:padding="12dp"><TextView android:id="@+id/tvTerms" android:layout_width="match_parent" android:layout_height="wrap_content" android:textColor="#AAAAAA" android:textSize="14sp"/></ScrollView><Button android:id="@+id/btnAcceptTerms" android:layout_width="match_parent" android:layout_height="55dp" android:layout_marginTop="16dp" android:background="@drawable/bg_button_gradient" android:text="I ACCEPT &amp; CONTINUE" android:textColor="#FFFFFF" android:textStyle="bold"/></LinearLayout>
        EOF

        cat << 'EOF' > app/src/main/res/layout/activity_main.xml
        <?xml version="1.0" encoding="utf-8"?><androidx.swiperefreshlayout.widget.SwipeRefreshLayout xmlns:android="http://schemas.android.com/apk/res/android" android:id="@+id/swipeRefresh" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#0B0B0B"><LinearLayout android:layout_width="match_parent" android:layout_height="match_parent" android:orientation="vertical"><LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal" android:padding="16dp" android:gravity="center_vertical"><TextView android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:text="Tech Store" android:textColor="#A855F7" android:textSize="24sp" android:textStyle="bold"/><Button android:id="@+id/btnUpload" android:layout_width="wrap_content" android:layout_height="35dp" android:background="@drawable/bg_button_gradient" android:text="Upload APK" android:textColor="#FFFFFF" android:textSize="12sp"/></LinearLayout><EditText android:id="@+id/searchBox" android:layout_width="match_parent" android:layout_height="45dp" android:layout_marginHorizontal="16dp" android:layout_marginBottom="8dp" android:background="@drawable/bg_rounded_search" android:hint="Search apps..." android:textColorHint="#AAAAAA" android:textColor="#FFFFFF" android:paddingStart="16dp"/><androidx.recyclerview.widget.RecyclerView android:id="@+id/recyclerApps" android:layout_width="match_parent" android:layout_height="match_parent" android:padding="8dp"/></LinearLayout></androidx.swiperefreshlayout.widget.SwipeRefreshLayout>
        EOF

        cat << 'EOF' > app/src/main/res/layout/item_app.xml
        <?xml version="1.0" encoding="utf-8"?><androidx.cardview.widget.CardView xmlns:android="http://schemas.android.com/apk/res/android" xmlns:app="http://schemas.android.com/apk/res-auto" android:layout_width="match_parent" android:layout_height="wrap_content" android:layout_margin="8dp" app:cardBackgroundColor="#1A1A1A" app:cardCornerRadius="16dp"><LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal" android:padding="12dp" android:gravity="center_vertical"><ImageView android:id="@+id/appIcon" android:layout_width="64dp" android:layout_height="64dp" android:scaleType="centerCrop"/><LinearLayout android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:orientation="vertical" android:layout_marginStart="12dp"><TextView android:id="@+id/appName" android:layout_width="wrap_content" android:layout_height="wrap_content" android:textColor="#FFFFFF" android:textSize="18sp" android:textStyle="bold"/><TextView android:id="@+id/appDev" android:layout_width="wrap_content" android:layout_height="wrap_content" android:textColor="#00FFFF" android:textSize="12sp"/><TextView android:id="@+id/appRating" android:layout_width="wrap_content" android:layout_height="wrap_content" android:textColor="#AAAAAA" android:textSize="12sp" android:layout_marginTop="2dp"/></LinearLayout></LinearLayout></androidx.cardview.widget.CardView>
        EOF

        cat << 'EOF' > app/src/main/res/layout/activity_details.xml
        <?xml version="1.0" encoding="utf-8"?><ScrollView xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#0B0B0B"><LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical"><ImageView android:id="@+id/detailBanner" android:layout_width="match_parent" android:layout_height="200dp" android:scaleType="centerCrop"/><LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal" android:padding="16dp"><ImageView android:id="@+id/detailIcon" android:layout_width="80dp" android:layout_height="80dp"/><LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical" android:layout_marginStart="16dp"><TextView android:id="@+id/detailName" android:layout_width="wrap_content" android:layout_height="wrap_content" android:textColor="#FFFFFF" android:textSize="22sp" android:textStyle="bold"/><TextView android:id="@+id/detailDev" android:layout_width="wrap_content" android:layout_height="wrap_content" android:textColor="#00FFFF"/><TextView android:id="@+id/detailInfo" android:layout_width="wrap_content" android:layout_height="wrap_content" android:textColor="#AAAAAA" android:layout_marginTop="4dp"/></LinearLayout></LinearLayout><Button android:id="@+id/btnDownload" android:layout_width="match_parent" android:layout_height="55dp" android:layout_margin="16dp" android:background="@drawable/bg_button_gradient" android:text="Install APK" android:textColor="#FFFFFF" android:textSize="18sp" android:textStyle="bold"/><TextView android:id="@+id/detailDesc" android:layout_width="match_parent" android:layout_height="wrap_content" android:padding="16dp" android:textColor="#FFFFFF" android:textSize="14sp"/></LinearLayout></ScrollView>
        EOF

        # ==========================================
        # 5. JAVA CODE (ALL FIXES APPLIED)
        # ==========================================
        cat << 'EOF' > app/src/main/java/com/techstore/models/AppModel.java
        package com.techstore.models; import java.io.Serializable; import java.util.ArrayList;
        public class AppModel implements Serializable { public String name, developer, version, size, rating, icon, banner, download, description, category; public ArrayList<String> screenshots; public AppModel(String n, String d, String v, String s, String r, String i, String b, String dw, String desc, String c, ArrayList<String> ss) { name=n; developer=d; version=v; size=s; rating=r; icon=i; banner=b; download=dw; description=desc; category=c; screenshots=ss; } }
        EOF

        cat << 'EOF' > app/src/main/java/com/techstore/utils/DownloadHelper.java
        package com.techstore.utils;
        import android.app.DownloadManager; import android.content.Context; import android.net.Uri; import android.os.Environment; import android.widget.Toast;
        public class DownloadHelper {
            public static void startDownload(Context context, String url, String title) {
                try {
                    DownloadManager.Request request = new DownloadManager.Request(Uri.parse(url));
                    request.setTitle(title); request.setDescription("Downloading " + title);
                    request.setNotificationVisibility(DownloadManager.Request.VISIBILITY_VISIBLE_NOTIFY_COMPLETED);
                    request.setDestinationInExternalPublicDir(Environment.DIRECTORY_DOWNLOADS, title + ".apk");
                    DownloadManager manager = (DownloadManager) context.getSystemService(Context.DOWNLOAD_SERVICE);
                    manager.enqueue(request);
                    Toast.makeText(context, "Download Started! Check Notifications.", Toast.LENGTH_LONG).show();
                } catch (Exception e) { Toast.makeText(context, "Error: " + e.getMessage(), Toast.LENGTH_SHORT).show(); }
            }
        }
        EOF

        cat << 'EOF' > app/src/main/java/com/techstore/adapters/AppAdapter.java
        package com.techstore.adapters; import android.content.Context; import android.content.Intent; import android.view.LayoutInflater; import android.view.View; import android.view.ViewGroup; import android.widget.ImageView; import android.widget.TextView; import androidx.annotation.NonNull; import androidx.recyclerview.widget.RecyclerView; import com.bumptech.glide.Glide; import com.bumptech.glide.load.resource.bitmap.RoundedCorners; import com.techstore.DetailsActivity; import com.techstore.R; import com.techstore.models.AppModel; import java.util.List;
        public class AppAdapter extends RecyclerView.Adapter<AppAdapter.ViewHolder> { private Context context; private List<AppModel> list; public AppAdapter(Context c, List<AppModel> l) { context=c; list=l; } public void filterList(List<AppModel> f) { list=f; notifyDataSetChanged(); } @NonNull @Override public ViewHolder onCreateViewHolder(@NonNull ViewGroup parent, int viewType) { return new ViewHolder(LayoutInflater.from(context).inflate(R.layout.item_app, parent, false)); } @Override public void onBindViewHolder(@NonNull ViewHolder holder, int position) { AppModel model = list.get(position); holder.appName.setText(model.name); holder.appDev.setText(model.developer); holder.appRating.setText(model.rating + " ★ | " + model.size); Glide.with(context).load(model.icon).transform(new RoundedCorners(24)).into(holder.appIcon); holder.itemView.setOnClickListener(v -> { Intent intent = new Intent(context, DetailsActivity.class); intent.putExtra("app_data", model); context.startActivity(intent); }); } @Override public int getItemCount() { return list.size(); } public static class ViewHolder extends RecyclerView.ViewHolder { ImageView appIcon; TextView appName, appDev, appRating; public ViewHolder(@NonNull View itemView) { super(itemView); appIcon = itemView.findViewById(R.id.appIcon); appName = itemView.findViewById(R.id.appName); appDev = itemView.findViewById(R.id.appDev); appRating = itemView.findViewById(R.id.appRating); } } }
        EOF

        cat << 'EOF' > app/src/main/java/com/techstore/SplashActivity.java
        package com.techstore; import android.content.Intent; import android.content.SharedPreferences; import android.os.Bundle; import android.os.Handler; import android.os.Looper; import androidx.appcompat.app.AppCompatActivity;
        public class SplashActivity extends AppCompatActivity { @Override protected void onCreate(Bundle savedInstanceState) { super.onCreate(savedInstanceState); setContentView(R.layout.activity_splash); new Handler(Looper.getMainLooper()).postDelayed(() -> { SharedPreferences prefs = getSharedPreferences("TechStorePrefs", MODE_PRIVATE); if (prefs.getBoolean("terms_accepted", false)) { startActivity(new Intent(SplashActivity.this, MainActivity.class)); } else { startActivity(new Intent(SplashActivity.this, TermsActivity.class)); } finish(); }, 2500); } }
        EOF

        cat << 'EOF' > app/src/main/java/com/techstore/TermsActivity.java
        package com.techstore; import android.content.Intent; import android.os.Bundle; import android.widget.Button; import android.widget.TextView; import androidx.appcompat.app.AppCompatActivity;
        public class TermsActivity extends AppCompatActivity { @Override protected void onCreate(Bundle savedInstanceState) { super.onCreate(savedInstanceState); setContentView(R.layout.activity_terms); TextView tvTerms = findViewById(R.id.tvTerms); Button btnAccept = findViewById(R.id.btnAcceptTerms); tvTerms.setText("Welcome to Tech Store.\n\nUse all APKs at your own risk. The developer is not responsible for any issues."); btnAccept.setOnClickListener(v -> { getSharedPreferences("TechStorePrefs", MODE_PRIVATE).edit().putBoolean("terms_accepted", true).apply(); startActivity(new Intent(TermsActivity.this, MainActivity.class)); finish(); }); } }
        EOF

        cat << 'EOF' > app/src/main/java/com/techstore/DetailsActivity.java
        package com.techstore; import android.os.Bundle; import android.widget.Button; import android.widget.ImageView; import android.widget.TextView; import androidx.appcompat.app.AppCompatActivity; import com.bumptech.glide.Glide; import com.bumptech.glide.load.resource.bitmap.RoundedCorners; import com.techstore.models.AppModel; import com.techstore.utils.DownloadHelper;
        public class DetailsActivity extends AppCompatActivity { @Override protected void onCreate(Bundle savedInstanceState) { super.onCreate(savedInstanceState); setContentView(R.layout.activity_details); AppModel app = (AppModel) getIntent().getSerializableExtra("app_data"); if (app == null) return; ImageView banner = findViewById(R.id.detailBanner); ImageView icon = findViewById(R.id.detailIcon); TextView name = findViewById(R.id.detailName); TextView dev = findViewById(R.id.detailDev); TextView info = findViewById(R.id.detailInfo); TextView desc = findViewById(R.id.detailDesc); Button btnDownload = findViewById(R.id.btnDownload); name.setText(app.name); dev.setText(app.developer); info.setText("Size: " + app.size + " | Rating: " + app.rating); desc.setText(app.description); Glide.with(this).load(app.banner).into(banner); Glide.with(this).load(app.icon).transform(new RoundedCorners(32)).into(icon); btnDownload.setOnClickListener(v -> DownloadHelper.startDownload(this, app.download, app.name)); } }
        EOF

        cat << 'EOF' > app/src/main/java/com/techstore/MainActivity.java
        package com.techstore; import android.content.Intent; import android.net.Uri; import android.os.Bundle; import android.text.Editable; import android.text.TextWatcher; import android.widget.Button; import android.widget.EditText; import android.widget.Toast; import androidx.appcompat.app.AppCompatActivity; import androidx.recyclerview.widget.LinearLayoutManager; import androidx.recyclerview.widget.RecyclerView; import androidx.swiperefreshlayout.widget.SwipeRefreshLayout; import com.android.volley.Request; import com.android.volley.toolbox.StringRequest; import com.android.volley.toolbox.Volley; import com.techstore.adapters.AppAdapter; import com.techstore.models.AppModel; import org.json.JSONArray; import org.json.JSONObject; import java.util.ArrayList; import java.util.List;
        public class MainActivity extends AppCompatActivity { RecyclerView recyclerApps; AppAdapter appAdapter; List<AppModel> fullAppList = new ArrayList<>(); SwipeRefreshLayout swipeRefresh; EditText searchBox; String JSON_URL = "https://pastebin.com/raw/NazABkD4"; @Override protected void onCreate(Bundle savedInstanceState) { super.onCreate(savedInstanceState); setContentView(R.layout.activity_main); recyclerApps = findViewById(R.id.recyclerApps); swipeRefresh = findViewById(R.id.swipeRefresh); searchBox = findViewById(R.id.searchBox); Button btnUpload = findViewById(R.id.btnUpload); recyclerApps.setLayoutManager(new LinearLayoutManager(this)); appAdapter = new AppAdapter(this, fullAppList); recyclerApps.setAdapter(appAdapter); fetchAppsOnline(); swipeRefresh.setOnRefreshListener(this::fetchAppsOnline); btnUpload.setOnClickListener(v -> { Intent intent = new Intent(Intent.ACTION_VIEW, Uri.parse("https://t.me/TechguruStore_bot")); startActivity(intent); }); searchBox.addTextChangedListener(new TextWatcher() { @Override public void beforeTextChanged(CharSequence s, int start, int count, int after) {} @Override public void onTextChanged(CharSequence s, int start, int before, int count) { List<AppModel> filtered = new ArrayList<>(); for (AppModel app : fullAppList) { if (app.name.toLowerCase().contains(s.toString().toLowerCase())) { filtered.add(app); } } appAdapter.filterList(filtered); } @Override public void afterTextChanged(Editable s) {} }); } private void fetchAppsOnline() { swipeRefresh.setRefreshing(true); StringRequest request = new StringRequest(Request.Method.GET, JSON_URL, response -> { try { fullAppList.clear(); JSONArray array = new JSONArray(response); for (int i = 0; i < array.length(); i++) { JSONObject obj = array.getJSONObject(i); ArrayList<String> screens = new ArrayList<>(); if(obj.has("screenshots")) { JSONArray ssArray = obj.getJSONArray("screenshots"); for(int j = 0; j < ssArray.length(); j++) { screens.add(ssArray.getString(j)); } } fullAppList.add(new AppModel( obj.getString("name"), obj.getString("developer"), obj.getString("version"), obj.getString("size"), obj.getString("rating"), obj.getString("icon"), obj.getString("banner"), obj.getString("download"), obj.getString("description"), obj.getString("category"), screens )); } appAdapter.notifyDataSetChanged(); } catch (Exception e) { Toast.makeText(this, "JSON Error: " + e.getMessage(), Toast.LENGTH_SHORT).show(); } swipeRefresh.setRefreshing(false); }, error -> { Toast.makeText(this, "Network Error", Toast.LENGTH_SHORT).show(); swipeRefresh.setRefreshing(false); }); request.setShouldCache(false); Volley.newRequestQueue(this).add(request); } }
        EOF

    - name: Build APK Final
      run: gradle app:assembleDebug --stacktrace

    - name: Upload APK File
      uses: actions/upload-artifact@v4
      with:
        name: TechStore-App
        path: app/build/outputs/apk/**/*.apk
